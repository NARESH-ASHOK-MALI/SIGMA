<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET And POST Requets</title>
</head>
<body>
    <h1>Get Request</h1>
    <form method="get" action="http://localhost:5500/register">
        <input placeholder="Enter Username" name="user" type="text">
        <input placeholder="Enter Password" name="pwd"type="password">
        <button >Register</button>
    </form>
    <hr>
    <h1>Post Request</h1>
    <form method="Post" action="http://localhost:5500/register">
        <input placeholder="Enter Username" name="user" type="text">
        <input placeholder="Enter Password" name="pwd"type="password">
        <button >Register</button>
    </form>
</body>
</html>
