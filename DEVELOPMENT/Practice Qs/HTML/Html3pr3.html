<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML-LEVEL 3</title>
</head>
<body>
    <header><h1>Assignment 3</h1></header>
    <hr>
    <main>
        <div>
            <table border ="Black">
                <caption>Student Information</caption>
                    <tr>
                        <th rowspan="6">Info</th>
                        <th rowspan="2">Name</th>
                        <th colspan="2">Address</th>
                    </tr>
                    <tr>
                        <th>City</th>
                        <th>House</th>
                    </tr>
                    <tr>
                        <td>A</td>
                        <td>Delhi</td>
                        <td>1</td>
                    </tr>
                    <tr>
                        <td>B</td>
                        <td>Mumbai</td>
                        <td>2</td>
                    </tr>
                    <tr>
                        <td>C</td>
                        <td>Kolkata</td>
                        <td>3</td>
                    </tr>
                    <tr>
                        <td>D</td>
                        <td>Pune</td>
                        <td>4</td>
                    </tr>
            </table>
        </div>
        <hr>
        <div>
            <form action="action/">
                <caption><b>Form 1</b></caption>
                <div>
                    <p></p>
                </div>
                <div>
                    <label for="name">Name:</label>
                    <input type="text" name="name" placeholder="Enter your name" id="name">
                </div>
                <div>
                    <p></p>
                </div>
                <div>
                    Sex:
                    <input type="radio" id="M" name="sex" value="m">
                    <label for="M">Male</label>
                    <input type="radio" id="F" name="sex" value="f">
                    <label for="F">Female</label>
                    <input type="radio" id="O" name="sex" value="O">
                    <label for="O">Other</label>
                </div>
                <div>
                    <p></p>
                </div>
                <div>
                    <label for="coun">Country:</label>
                    <select name="Country" id="coun">
                        <option>Select your Country</option>
                        <option value="India">India</option>
                        <option value="Nepal">Nepal</option>
                        <option value="USA">USA</option>
                        <option value="Canada">Canada</option>
                    </select>
                </div>
                <div>
                    <p></p>
                </div>
                <div>
                    <label for="msg">Message:</label>
                    <br>
                    <textarea name="msg" id="msg" rows="3"></textarea>
                </div>
                <div>
                    <p></p>
                </div>
                <div>
                    <input type="checkbox" name="subscrition" id="sub">
                    <label for="sub">Subscribe??</label>
                </div>
                <div>
                    <p></p>
                </div>
                <button>Submit</button>
            </form>
        </div>
        <hr>
        <div>
            <form action="action/">
                <caption>
                    <h2>Feedback Form</h2>
                </caption>
                <div>
                    <label for="Name">Name:</label>
                    <input type="text" name="Name" placeholder="Write your name" id ="Name">
                    <div>
                        <p></p>
                    </div>
                    <label for="email">Email:</label>
                    <input type="email" name="Name" placeholder="Write your email" id="email">
                </div>
                <div>
                    <p></p>
                </div>
                <div>
                    <label for="MSG">Message:</label>
                    <br>
                    <textarea name="MSG" id="MSG"  rows="3"></textarea>
                </div>
                <div>
                    Rate us out of 5:
                    <br>
                    <input type="radio" id="1" value="1" name="Rating">
                    <label for="1">1</label>
                    <br>
                    
                    <input type="radio" id="2" value="2" name="Rating">
                    <label for="2">2</label>
                    <br>
                    <input type="radio" id="3" value="3" name="Rating">
                    <label for="3">3</label>
                    <br>
                    <input type="radio" id="4" value="4" name="Rating">
                    <label for="4">4</label>
                    <br>
                    <input type="radio" id="5" value="5" name="Rating">
                    <label for="5">5</label>
                    <br>
                </div>
                <div>
                    <p></p>
                </div>
                <div>
                    <p></p>
                </div>
                <button>Send your message!</button>
            </form>
        </div>
        <hr>
    </main>
</body>
</html>
